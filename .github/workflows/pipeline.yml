name: Bangla News Pipeline

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false   # Model files are regular git files, not LFS

      # Cache only pip packages — the embedding model is committed to the repo
      # and loaded from ./models/ at runtime, no HuggingFace download needed.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Verify the model directory is present before running
      - name: Check model files
        run: |
          if [ ! -d "models/all-MiniLM-L6-v2" ]; then
            echo "ERROR: models/all-MiniLM-L6-v2/ not found in repo."
            echo "Run 'python download_model.py' locally and commit the models/ folder."
            exit 1
          fi
          echo "Model directory found: $(du -sh models/all-MiniLM-L6-v2 | cut -f1)"

      # Restore SQLite databases from previous runs
      - name: Restore pipeline databases
        uses: actions/cache@v4
        id: db-cache
        with:
          path: |
            news_pipeline.sqlite
            dedup_cache.sqlite
          key: pipeline-db-${{ github.run_number }}
          restore-keys: |
            pipeline-db-

      - name: Run pipeline
        env:
          GROQ_API_KEY:                ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN:                ${{ secrets.HF_API_TOKEN }}
          STORAGE_MODE:                ${{ vars.STORAGE_MODE || 'sqlite' }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:         ${{ secrets.TELEGRAM_CHANNEL_ID }}
          IMPORTANCE_SCORE_THRESHOLD:  ${{ vars.IMPORTANCE_SCORE_THRESHOLD || '3.0' }}
          DEDUP_SIMILARITY_THRESHOLD:  ${{ vars.DEDUP_SIMILARITY_THRESHOLD || '0.85' }}
          HF_CLASSIFICATION_THRESHOLD: ${{ vars.HF_CLASSIFICATION_THRESHOLD || '0.55' }}
          LOG_LEVEL: INFO
        run: python main.py

      - name: Commit updated databases (SQLite mode)
        if: ${{ vars.STORAGE_MODE != 'sheets' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f news_pipeline.sqlite dedup_cache.sqlite || true
          git diff --staged --quiet || git commit -m "chore: update pipeline databases [skip ci]"
          git push || true
