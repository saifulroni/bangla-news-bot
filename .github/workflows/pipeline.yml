name: Bangla News Pipeline

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check model files
        run: |
          if [ ! -d "models/all-MiniLM-L6-v2" ]; then
            echo "ERROR: models/all-MiniLM-L6-v2/ not found in repo."
            exit 1
          fi
          echo "Model found: $(du -sh models/all-MiniLM-L6-v2 | cut -f1)"

      - name: Restore pipeline databases
        uses: actions/cache@v4
        with:
          path: |
            news_pipeline.sqlite
            dedup_cache.sqlite
          key: pipeline-db-${{ github.run_number }}
          restore-keys: |
            pipeline-db-

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          STORAGE_MODE: sqlite
          IMPORTANCE_SCORE_THRESHOLD: "3.0"
          DEDUP_SIMILARITY_THRESHOLD: "0.85"
          LOG_LEVEL: INFO
        run: python main.py

      - name: Commit databases to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f news_pipeline.sqlite dedup_cache.sqlite || true
          git diff --staged --quiet || git commit -m "chore: update databases [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
